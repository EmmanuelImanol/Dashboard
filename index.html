<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <title>Document</title>
</head>
<body>
  
  <div class="bg-slate-200 max-width-7xl w-[98%] mx-auto my-2 flex">
    <aside class="bg-blue-600 w-54 md:w-64 text-white p-2 rounded-xl flex flex-col justify-between">
      <div class="bg-blue-900 rounded-lg">
        <h1>Intranet</h1>
      </div>
      <nav class="flex flex-col rounded-lg">
        <a href="/">Dashboard</a>
        <a href="#">Usuarios</a>
        <a href="#">Documentos</a>
        <a href="#">Noticias</a>
      </nav>
      <div class="rounded-lg">
        <p>Admin</p>
      </div>
    </aside>
    <!-- Contenido principal -->
    <main class="p-2 h-full grid gap-4 w-full">
      <!-- Tarjetas de navegación -->
      <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
        <div class="bg-blue-200 p-2 rounded-xl">
          <p>Usuarios</p>
        </div>
        <div class="bg-blue-200 p-2 rounded-xl">
          <p>Noticias</p>
        </div>
        <div class="bg-blue-200 p-2 rounded-xl">
          <p>Documentos</p>
        </div>
      </div>
      <!-- Tarjetas de actividad -->
       <div class="grid grid-cols-1 md:grid-cols-2 gap-4 w-full">
        <div class="bg-blue-200 p-2 rounded-xl w-full">
          <div class="flex justify-between px-2">
            <p>Noticias recientes</p>
            <button 
              type="button"
              class="cursor-pointer hover:text-blue-600 transition"
            >Ver todas</button>
          </div>
        </div>
        <!-- Contenedor de documentos recientes -->
        <div class="bg-blue-200 p-2 rounded-xl">
          <div class="flex justify-between px-2 mb-2">
            <p>Documentos recientes</p>
            <button 
              type="button"
              class="cursor-pointer hover:text-blue-600 transition"
            >Ver todas</button>
          </div>
          <div class="px-2">
            <div class="flex items-center gap-2 bg-gray-50 rounded p-1">
              <i class="fa-solid fa-file-pdf"></i>
              <p>Nombre del archivo</p>
            </div>
          </div>
        </div>
       </div>
    </main>
  </div>

</body>
</html>
